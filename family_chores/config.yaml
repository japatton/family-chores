name: Family Chores
version: "0.3.1"
slug: family_chores
description: Family chore tracking and rewards, with HA entity bridging.
arch:
  - amd64
  - aarch64
  - armv7
# HA Supervisor pulls this image from GHCR instead of building locally
# from the addon directory. Required since Phase 2 (DECISIONS §11): the
# Dockerfile copies workspace packages from the repo root (packages/{core,
# db,api}, pnpm-lock.yaml at root), but Supervisor invokes `docker build`
# with the addon's directory as the build context — no way for the local
# build to reach the parent dir. The release.yml workflow builds with
# repo-root context and pushes images here; Supervisor pulls them.
image: ghcr.io/japatton/family-chores-{arch}
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:broom
panel_title: Family Chores
hassio_api: true
hassio_role: default
homeassistant_api: true
auth_api: true
# Empty `network:` makes the port-exposure model explicit (HA convention
# per the F-X001 review note). The addon listens on `ingress_port` only
# inside the supervisor network — Supervisor's ingress proxy is the
# external entry point. No host-port mapping; no direct LAN exposure.
network: {}
options:
  log_level: info
  week_starts_on: monday
  sound_default: false
  timezone: ""
schema:
  log_level: list(debug|info|warning|error)
  week_starts_on: list(monday|sunday)
  sound_default: bool
  timezone: str?
