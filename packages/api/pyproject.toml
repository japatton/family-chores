[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "family-chores-api"
version = "0.1.0"
description = "FastAPI routers, services, schemas, WS, and error envelope for Family Chores (see DECISIONS §11)."
requires-python = ">=3.12"
authors = [{ name = "Jason Patton" }]
license = { text = "MIT" }
# Step 4 will populate these with FastAPI/Pydantic/PyJWT/argon2-cffi and
# add `family-chores-core` + `family-chores-db` as workspace deps. Kept
# empty at step 1 so the scaffold syncs without pulling real deps.
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
