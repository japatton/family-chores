[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "family-chores-db"
version = "0.1.0"
description = "SQLAlchemy models, Alembic migrations, and DB helpers for Family Chores (see DECISIONS §11)."
requires-python = ">=3.12"
authors = [{ name = "Jason Patton" }]
license = { text = "MIT" }
dependencies = [
    # Workspace dep — db.models imports the domain enums and `utcnow` from core.
    "family-chores-core",
    "sqlalchemy[asyncio]>=2.0.30,<2.1",
    "aiosqlite>=0.20,<0.21",
    "alembic>=1.13,<1.14",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
# Migration scripts must ship with the wheel — `default_alembic_upgrade()`
# in recovery.py resolves them via `Path(__file__).parent / "migrations"`,
# which fails on a non-editable install if the package data is excluded.
# `py.typed` is the PEP 561 marker — see packages/core/pyproject.toml.
family_chores_db = ["migrations/**/*", "py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
