; Alembic config for local CLI use only.
; At runtime the app builds an `alembic.Config` programmatically and points
; `script_location` into the installed package (see
; `family_chores_db.recovery.default_alembic_upgrade`). This file exists so
; that `alembic revision`, `alembic history`, etc. work from `packages/db/`
; during development.

[alembic]
script_location = src/family_chores_db/migrations
prepend_sys_path = src
timezone = UTC
file_template = %%(rev)s_%%(slug)s
output_encoding = utf-8
; sqlalchemy.url is resolved by env.py from FAMILY_CHORES_DB or a local
; fallback — do not hard-code it here.

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
