[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "family-chores-core"
version = "0.1.0"
description = "Pure domain logic for Family Chores — shared across deployment targets (see DECISIONS §11)."
requires-python = ">=3.12"
authors = [{ name = "Jason Patton" }]
license = { text = "MIT" }
# Core is pure domain logic — no SQLAlchemy, no FastAPI, no HA deps.
# Anything that needs the network or a DB belongs elsewhere.
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
