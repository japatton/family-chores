name: Release

# Runs when a version tag is pushed (e.g. `v0.1.0`). Builds the multi-arch
# add-on image, builds the Lovelace card, and attaches both to a GitHub
# Release.

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository }}
  # Opt Node-20-based actions into Node 24 runtime ahead of the June
  # 2026 forced switch (silences the deprecation warning).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-image:
    name: Build ${{ matrix.arch }} add-on image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.20
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.20
          - arch: armv7
            platform: linux/arm/v7
            base: ghcr.io/home-assistant/armv7-base-python:3.12-alpine3.20
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version (strip leading `v` from the git tag)
        id: vars
        # HA Supervisor pulls `<image>:<version>` where `<version>` is
        # the `version:` field in config.yaml — which doesn't have a
        # `v` prefix. The git tag does (e.g. `v0.2.0`). Without
        # stripping, Supervisor would 404 looking for `:0.2.0` while
        # the image was pushed as `:v0.2.0`.
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Repo root context (changed in Phase 2 step 12 — DECISIONS §11).
          # The Dockerfile copies workspace packages from packages/ and
          # the pnpm lockfile from the workspace root, neither of which
          # is reachable when the context is the addon directory.
          context: .
          file: ./family_chores/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}:${{ steps.vars.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=${{ matrix.base }}

  build-card:
    name: Build Lovelace card
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Activate pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: pnpm install (card only)
        run: pnpm install --frozen-lockfile --filter family-chores-card

      - name: Build
        working-directory: lovelace-card
        run: pnpm run build

      - name: Upload artefact for release job
        uses: actions/upload-artifact@v4
        with:
          name: family-chores-card
          path: lovelace-card/dist/family-chores-card.js

  publish-release:
    name: Publish GitHub release
    needs: [build-image, build-card]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download card artefact
        uses: actions/download-artifact@v4
        with:
          name: family-chores-card
          path: ./release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            Family Chores ${{ github.ref_name }}.

            **Add-on images** (multi-arch) pushed to:
            - `ghcr.io/${{ github.repository }}-amd64:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository }}-aarch64:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository }}-armv7:${{ github.ref_name }}`

            **Lovelace card** is attached below — drop into
            `/config/www/family-chores-card.js` and register it as a
            `JavaScript Module` resource (see `lovelace-card/README.md`).
          draft: false
          prerelease: false
          files: |
            release-assets/family-chores-card.js
