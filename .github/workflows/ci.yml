name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — lint, typecheck, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -e 'backend/[dev]'

      - name: ruff check
        run: ruff check backend/

      - name: mypy --strict
        run: mypy backend/src --strict

      - name: pytest
        run: pytest backend/tests/ -q

  frontend:
    name: Frontend — lint, typecheck, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Vitest
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload built SPA artefact
        uses: actions/upload-artifact@v4
        with:
          name: spa-dist
          path: backend/src/family_chores/static/
          retention-days: 7

  lovelace-card:
    name: Lovelace card — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lovelace-card
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: lovelace-card/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload card artefact
        uses: actions/upload-artifact@v4
        with:
          name: family-chores-card
          path: lovelace-card/dist/family-chores-card.js
          retention-days: 7
