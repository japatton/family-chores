name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — lint, typecheck, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: family_chores/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: family_chores/backend/pyproject.toml

      - name: Install backend deps
        # `.[dev]` inside the cd'd directory sidesteps pip's
        # `path/[extras]` parsing quirk we'd hit with the absolute form.
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: ruff check
        run: ruff check .

      - name: mypy --strict
        run: mypy src --strict

      - name: pytest
        run: pytest tests/ -q

  frontend:
    name: Frontend — lint, typecheck, tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: family_chores/frontend/package-lock.json

      - name: Install deps
        working-directory: family_chores/frontend
        run: npm ci

      - name: ESLint
        working-directory: family_chores/frontend
        run: npm run lint

      - name: Typecheck
        working-directory: family_chores/frontend
        run: npm run typecheck

      - name: Vitest
        working-directory: family_chores/frontend
        run: npm test

      - name: Build
        working-directory: family_chores/frontend
        run: npm run build

      - name: Upload built SPA artefact
        uses: actions/upload-artifact@v4
        with:
          name: spa-dist
          path: family_chores/backend/src/family_chores/static/
          retention-days: 7

  lovelace-card:
    name: Lovelace card — typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: lovelace-card/package-lock.json

      - name: Install deps
        working-directory: lovelace-card
        run: npm ci

      - name: Typecheck
        working-directory: lovelace-card
        run: npm run typecheck

      - name: Build
        working-directory: lovelace-card
        run: npm run build

      - name: Upload card artefact
        uses: actions/upload-artifact@v4
        with:
          name: family-chores-card
          path: lovelace-card/dist/family-chores-card.js
          retention-days: 7
